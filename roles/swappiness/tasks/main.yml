---
  - name: "Set vm.swappiness to {{ swapiness }}"
    copy:
      dest: "/etc/sysctl.d/10-swappiness.conf"
      content: "vm.swappiness = {{ swapiness }} "
  - name: reload swapiness parameter
    command: sysctl -p /etc/sysctl.d/10-swappiness.conf

  - name: some commands to monitor memory and swap usage
    copy:
      force: yes
      backup: no
      owner: "root"
      group: "root"
      mode: 0755
      src: "{{ item }}"
      dest: "/root/bin"
    with_fileglob: "bin/*"
    tags:
      - mem-utils
      - never

