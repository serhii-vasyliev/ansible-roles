---
is_open_web_server: true	# Both http and httpS
is_open_http_server: true	# Enable it if you are using certbot
is_open_https_server: false
ipaccess_template: 'iptables.j2'
lxc_nat_template: 'lxc-nat.j2'
ip_nat: []
is_lxc: false
lxc_net: '10.0.3.0/24'
is_libvirt: false
libvirt_net: '192.168.122/24'
is_dnat: true
is_masquerade: false

#iptables_file: '/etc/sysconfig/iptables'
iptables_file_rhel: "/etc/sysconfig/iptables"
iptables_file_ubuntu: "/etc/network/iptables.up.rules"
# iptables_tmp_file is just to save rules to compare them with if iptables_file validation fails
iptables_tmp_file: '/etc/sysconfig/iptables.tmp'

change_root_password: true
ip6tables_file: '/etc/sysconfig/ip6tables'
is_ipv6_web_server: false
is_only_cloudflare: false
# mail ports  smtp , submission , pop3 , pop3s , imap , imaps 
mail_ports: ['25','587','465','110','995','143','993']
is_smtp_server: false
is_mail_server: false
is_open_ftp_server: false
is_lxc_mailserver: false
lxc_mailserver: '10.0.3.10'
lxc_access_from: []
lxc_containers: []
lxc_containers_mysql: []
iplist_lxc_mysql_access: []
iplist_ssh_access_hosts: []
ftp_umask: 022
rewrite_vsftpd_conf: true
#ftp_multi_ports: '21,9999:65535'
multiport_comment: 'ftp ansible'
ftp_multi_ports: '21,12000:12100'
iplist_ftp_access_hosts: ['']

# Put your actual ipaccess_default list of rules, which may be common for all your hosts, into group_vars/all
# You may redifine it at host_vars/ level, or use ipaccess_extended list to customize firewall for paticular host or group.
ipaccess_default:
  - name: ssh full access
    iplist: ['0.0.0.0/0']
    ports: 'ssh'

ipaccess_extended:
  - name: "May be redifined in group, host or task vars, if neccessary to add more than default rules. Non-empty and defined iplist and ports in each item are mandatory to achieve this goal"
    iplist: []

ipv4list_cloudflare: ['173.245.48.0/20', '103.21.244.0/22', '103.22.200.0/22', '103.31.4.0/22', '141.101.64.0/18', '108.162.192.0/18', '190.93.240.0/20', '188.114.96.0/20', '197.234.240.0/22', '198.41.128.0/17', '162.158.0.0/15', '104.16.0.0/12', '172.64.0.0/13', '131.0.72.0/22']
